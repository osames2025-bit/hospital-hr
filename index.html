<style>
:root{

  --green:#639922;--green-l:#EAF3DE;
  --bg:#fff;--bg2:#f4f3ef;--bg3:#eae8e0;
  --text:#1a1a1a;--text2:#555;--text3:#999;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:14px;background:var(--bg2);color:var(--text);min-height:100vh}
h2{font-size:17px;font-weight:500}h3{font-size:15px;font-weight:500}h4{font-size:13px;font-weight:500}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:var(--rs);outline:none;background:var(--bg);color:var(--text);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 2px rgba(29,158,117,.12)}
textarea{resize:vertical;min-height:68px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.2rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--teal);color:#fff}
.btn-secondary{background:transparent;border:0.5px solid var(--border2);color:var(--text2)}
.btn-danger{background:var(--red-l);color:var(--red);border:0.5px solid var(--red)}
.btn-warn{background:var(--amber-l);color:var(--amber-d);border:0.5px solid var(--amber)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.flex{display:flex;align-items:center}
.fb{display:flex;align-items:center;justify-content:space-between}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.muted{color:var(--text3);font-size:12px}
.sm{font-size:12px}
.pbar-bg{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.pw-wrap{position:relative;width:100%}
.pw-wrap input{padding-right:36px}
.pw-toggle{position:absolute;right:0;top:0;height:100%;width:36px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0}
.pw-toggle:hover{color:var(--text2)}

.nav-i:hover{background:var(--bg2)}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.sel5{border-color:var(--blue)!important;background:var(--blue-l)}
.sel1{border-color:var(--amber)!important;background:var(--amber-l)}

/* Modal */

  .card{border:1px solid #ccc;page-break-inside:avoid}

// 全エラーを画面に表示（デバッグ）
window.onerror=function(msg,src,line,col,err){
  var app=document.getElementById('app');
  if(!app)return;
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:0;left:0;right:0;background:#FCEBEB;color:#A32D2D;padding:16px;font-size:13px;z-index:9999;border-bottom:2px solid #E24B4A;font-family:monospace;white-space:pre-wrap;';
  d.textContent='エラー: '+msg+'\n行: '+line+'\n'+src;
  document.body.appendChild(d);
};
window.onunhandledrejection=function(e){
  var app=document.getElementById('app');
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:40px;left:0;right:0;background:#FAEEDA;color:#854F0B;padding:16px;font-size:13px;z-index:9999;border-bottom:2px solid #BA7517;font-family:monospace;';
  d.textContent='非同期エラー: '+(e.reason?.message||e.reason||'unknown');
  document.body.appendChild(d);
};

// パスワード入力＋表示トグルのヘルパー
function pwField(id, placeholder, onInputCb){
  var inp = h('input',{type:'password', id:id||'', placeholder:placeholder||''});
  if(onInputCb) inp.addEventListener('input', function(e){onInputCb(e);});
  var toggle = h('button',{class:'pw-toggle',type:'button',title:'パスワードを表示/非表示',
    onClick:function(){
      inp.type = inp.type==='password' ? 'text' : 'password';
      toggle.textContent = inp.type==='password' ? '👁' : '🙈';
    }
  },'👁');
  var wrap = h('div',{class:'pw-wrap'}, inp, toggle);
  return wrap;
}

// ═══════════════════════════════════════════════════
// CLOUD CONFIG (管理者がUIから設定)
// ═══════════════════════════════════════════════════
const CFG_KEY = 'ryujinkai_cfg';
let CLOUD = (()=>{
  try { return JSON.parse(localStorage.getItem(CFG_KEY))||{url:'',secret:''}; }
  catch(e){ return {url:'',secret:''}; }
})();
function saveCloudCfg(){ localStorage.setItem(CFG_KEY, JSON.stringify(CLOUD)); }

let syncStatus = 'local'; // 'local' | 'syncing' | 'synced' | 'error'

// file:// プロトコルかどうかを検出
const IS_FILE_PROTOCOL = typeof location !== 'undefined' && location.protocol === 'file:';

async function loadFromCloud(){
  if(!CLOUD.url||!CLOUD.secret) return null;
  if(IS_FILE_PROTOCOL){ return null; } // file://ではfetch不可
  try {
    const r = await fetch(CLOUD.url+'?secret='+encodeURIComponent(CLOUD.secret)+'&action=load');
    if(!r.ok) return null;
    const data = await r.json();
    if(data.error) return null;
    return data;
  } catch(e){ return null; }
}

async function saveToCloud(db){
  if(!CLOUD.url||!CLOUD.secret) return false;
  if(IS_FILE_PROTOCOL){ return false; } // file://ではfetch不可
  try {
    const r = await fetch(CLOUD.url, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({secret:CLOUD.secret, db})
    });
    const data = await r.json();
    return data.ok === true;
  } catch(e){ return false; }
}

// 評価期間ヘルパー
// ═══════════════════════════════════════════════════
function genPeriods(){
  const now=new Date();
  const cur=now.getFullYear();
  const opts=[];
  // 2026年度から現在年度+2年まで（年1回評価）
  const start=2026;
  const end=Math.max(cur+2, start+4);
  for(let y=end;y>=start;y--){
    opts.push({v:y+'年度',l:y+'年度（'+y+'/4〜'+(y+1)+'/3）'});
  }
  return opts;
}

function calcSc(ans){
  const kihon =(ans.kihon ||[]).reduce((a,b)=>a+(b||0),0);
  const shokumu=(ans.shokumu||[]).reduce((a,b)=>a+(b||0),0);
  const seichou=(ans.seichou||[]).reduce((a,b)=>a+(b||0),0);
  const mokuhyo=ans.mokuhyo||0;
  return{kihon,shokumu,seichou,mokuhyo,total:kihon+shokumu+seichou+mokuhyo};
}
function getG(total){return GRADE_DEF.find(g=>total>=g.min)||GRADE_DEF[4];}

function h(tag,attrs,...kids){
  attrs=attrs&&typeof attrs==='object'&&!(attrs instanceof Element)?attrs:{};
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(v===null||v===undefined||v===false)continue;
    if(k==='class')el.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of kids.flat()){
    if(c===null||c===undefined||c===false)continue;
    el.appendChild(c instanceof Element?c:document.createTextNode(String(c)));
  }
  return el;
}
const div=(a,...c)=>h('div',a instanceof Element||typeof a==='string'?{}:a,...(a instanceof Element||typeof a==='string'?[a,...c]:c));
const span=(cls,txt)=>h('span',{class:cls},txt);
const btn=(cls,txt,cb)=>h('button',{class:'btn '+cls,onClick:cb},txt);

function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});}
function shLabel(id){return(SHOKUSHU.find(s=>s.id===id)||{label:id}).label;}

  return span('badge status-'+st,map[st]||st);
}
function gBadge(g){return span('badge g'+g,g);}
function gColor(g){return(GRADE_DEF.find(x=>x.g===g)||GRADE_DEF[4]).color;}
function gBg(g){return(GRADE_DEF.find(x=>x.g===g)||GRADE_DEF[4]).bg;}

// 所属長がいない部署かどうか（＝事務長が評価担当）
function hasHead(dept){return !!DB.users.find(u=>u.dept===dept&&u.role==='head');}
function deptNeedsJimucho(dept){return !hasHead(dept);}

// 誰が上司評価を担当するか
function supervisorOf(staffUser){
  // 同部署の所属長を探す
  const head=DB.users.find(u=>u.dept===staffUser.dept&&u.role==='head');
  if(head)return head;
  // 所属長がいない部署 → 事務長が評価
  const jimu=DB.users.find(u=>u.role==='jimucho');
  return jimu||null;
}

// Can current user approve 1st stage for this eval
function canApprove1(user,ev){
  if(!CAN_APPROVE1.includes(user.role))return false;
  if(user.role==='head')return ev.evaluatee_dept===user.dept;
  return true;
}

let _rafPending=false;
function schedRender(){
  if(_rafPending)return;
  _rafPending=true;
  setTimeout(function(){_rafPending=false;render();},0);
}

let _saveTimer=null;
function debounceSave(){
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    saveDB(DB);
    if(!IS_FILE_PROTOCOL && CLOUD.url && CLOUD.secret){
      saveToCloud(DB).then(ok=>{
        syncStatus=ok?'synced':(CLOUD.url?'error':'local');
        updateSyncBadge();
      }).catch(()=>{ syncStatus='error'; updateSyncBadge(); });
    }
  },800);
}

function set(u){Object.assign(S,u);schedRender();}
function toast(msg,type='ok'){
  S.toast={msg,type};schedRender();
  setTimeout(()=>{S.toast=null;schedRender();},3000);
}

function exportCSV(rows){
  const hdr=[
    '所属','氏名','職種','評価種別','評価期間',
    '①誠実な行動','②傾聴と共感','③協調とチームワーク','④責任感・主体性','⑤接遇マナー',
    '職務①','職務②','職務③',
    '学習意欲','情報共有','自己管理',
    '目標管理点数',
    '基本行動合計/50','職務遂行合計/30','自己成長合計/30','目標管理/40','総合点数/150','グレード',
    'ステータス','提出日','一次承認日','一次承認者','一次コメント','二次承認日','二次承認者','二次コメント',
    '成長コメント','今後の取り組み'
  ];
  const stLabel={draft:'下書き',submitted:'提出済み',approved_1:'一次承認済',approved_2:'最終承認済',rejected:'差戻し'};
  const data=rows.map(ev=>{
    const sc=calcSc(ev.answers);const g=getG(sc.total);
    const ans=ev.answers;
    // get shokumu labels for this evaluatee
    const shQ=SHOKUMU[ev.evaluatee_shokushu]||SHOKUMU.other;
    return[
      ev.evaluatee_dept,ev.evaluatee_name,shLabel(ev.evaluatee_shokushu),
      ev.type==='self'?'自己評価':'上司評価',ev.period||'',
      // kihon 5 items
      ans.kihon[0]||0,ans.kihon[1]||0,ans.kihon[2]||0,ans.kihon[3]||0,ans.kihon[4]||0,
      // shokumu 3 items
      ans.shokumu[0]||0,ans.shokumu[1]||0,ans.shokumu[2]||0,
      // seichou 3 items
      ans.seichou[0]||0,ans.seichou[1]||0,ans.seichou[2]||0,
      // mokuhyo direct score
      ans.mokuhyo||0,
      // totals
      sc.kihon,sc.shokumu,sc.seichou,sc.mokuhyo,sc.total,g.g,
      stLabel[ev.status]||ev.status,
      fmtDate(ev.submitted_at),
      fmtDate(ev.approval_1?.at),ev.approval_1?.by_name||'',ev.approval_1?.comment||'',
      fmtDate(ev.approval_2?.at),ev.approval_2?.by_name||'',ev.approval_2?.comment||'',
      (ans.growth_text||'').replace(/\n/g,' '),
      (ans.next_text||'').replace(/\n/g,' '),
    ];
  });
  const csv=[hdr,...data].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`${HOSPITAL}_人事評価_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSVをエクスポートしました');
}

function renderEvalForm(isSup){
  const u=S.user;
  const fd=S.form;
  if(!fd){
    // 下書きがあれば自動で読み込む
    const draft=!isSup?loadDraft():null;
    const defForm=draft&&draft.answers
      ? {step:draft.step||0,answers:draft.answers,profile:draft.profile||{period:DB.settings.period||PERIODS[0].v,shokushu:u.shokushu}}
      : {step:0,answers:initAns(),profile:{period:DB.settings.period||PERIODS[0].v,shokushu:u.shokushu}};
    S.form=defForm;schedRender();return h('div',null);
  }
  const{step,answers,profile}=fd;
  const shQ=SHOKUMU[profile.shokushu]||SHOKUMU.other;

  function upd(ch){Object.assign(S.form,ch);schedRender();}
  // BARSクリック時は状態だけ更新（DOM直接操作済み）→ re-renderしない
  function setK(i,v){if(S.form&&S.form.answers){const k=[...S.form.answers.kihon];k[i]=v;S.form.answers={...S.form.answers,kihon:k};}}
  function setS(i,v){if(S.form&&S.form.answers){const k=[...S.form.answers.shokumu];k[i]=v;S.form.answers={...S.form.answers,shokumu:k};}}
  function setG(i,v){if(S.form&&S.form.answers){const k=[...S.form.answers.seichou];k[i]=v;S.form.answers={...S.form.answers,seichou:k};}}

  function stepOk(){
    const a=S.form?.answers||answers;
    const p=S.form?.profile||profile;
    if(step===0)return!!p.period?.trim();
    if(step===1)return a.kihon.slice(0,3).every(v=>v>0);
    if(step===2)return a.kihon.slice(3).every(v=>v>0);
    if(step===3)return a.shokumu.every(v=>v>0);
    if(step===4)return a.seichou.every(v=>v>0);
    if(step===5)return true; // 0点も有効
    return true;
  }
  // allOkはS.form.answersから常に最新を読む
  const _fa=S.form?.answers||answers;
  const allOk=[..._fa.kihon,..._fa.shokumu,..._fa.seichou].every(v=>v>0)&&_fa.mokuhyo!==null&&_fa.mokuhyo!==undefined&&(S.form?.profile?.period||profile.period)?.trim();
  const _la=S.form?.answers||answers;
  const sc=calcSc(_la);const g=getG(sc.total);
  const low=KIHON.filter((k,i)=>(_la.kihon[i]||0)===1).map(k=>k.training);

  // 訪問済みステップ（step以下はすべてクリック可能）
  const prog=h('div',{class:'fprog'},
    ...FORM_STEPS.map((lbl,i)=>h('div',{
      class:'fprog-s'+(i<step?' done':i===step?' now':'')+(i<=step?' clickable':''),
      onClick(){ if(i<=step) upd({step:i}); }
    },
      h('div',{class:'fprog-bar'}),
      h('div',{class:'fprog-lbl'},lbl)
    ))
  );
  // 自動下書き保存（ステップ移動のたびに）
  if(!isSup) saveDraft({step,answers:S.form?.answers||answers,profile:S.form?.profile||profile});

  const navRow=h('div',{class:'fb',style:{marginTop:'16px',gap:'8px',flexWrap:'wrap'}},
    step>0?btn('btn-secondary','← 戻る',()=>upd({step:step-1})):h('span',null),
    h('div',{class:'flex gap8',style:{marginLeft:'auto'}},
      !isSup&&h('button',{class:'btn btn-secondary btn-sm',style:{color:'var(--text3)'},
        onClick(){
          saveDraft({step,answers:S.form?.answers||answers,profile:S.form?.profile||profile});
          toast('下書きを保存しました');
          set({page:'dashboard',form:null});
        }
      },'💾 下書き保存して退出'),
      step<FORM_STEPS.length-1
        ?h('button',{class:'btn btn-primary',disabled:!stepOk(),onClick(){if(stepOk())upd({step:step+1});}},'次へ →')
        :h('button',{class:'btn btn-primary',disabled:!allOk,onClick(){
          if(!allOk)return;
          const _ans=S.form?.answers||answers;
          const _prf=S.form?.profile||profile;
          const sc2=calcSc(_ans);const g2=getG(sc2.total);
          const targetUser=fd.targetUser||u;
          const ev={
            id:S.evalEditId||uid(),
            type:isSup?'supervisor':'self',
            evaluatee_id:targetUser.id,
            evaluatee_name:targetUser.name,
            evaluatee_dept:targetUser.dept,
            evaluatee_shokushu:_prf.shokushu||targetUser.shokushu,
            evaluator_id:u.id,
            evaluator_name:u.name,
            evaluator_role:u.role,
            period:_prf.period,
            answers:{..._ans},
            grade:g2.g,
            status:'submitted',
            submitted_at:Date.now(),
            approval_1:null,approval_2:null,
            created_at:Date.now(),
          };
          const idx=DB.evaluations.findIndex(e=>e.id===ev.id);
          if(idx>=0)DB.evaluations[idx]=ev;else DB.evaluations.push(ev);
          save();
          if(!isSup) clearDraft(); // 提出したら下書きを削除
          set({page:'history',form:null,evalEditId:null,splitSelf:null});
          toast(isSup?`${targetUser.name}さんの上司評価を提出しました`:'自己評価を提出しました');
        }},allOk?'提出する':'未入力があります')
    ) // h('div',{class:'flex gap8'})
  ); // navRow

  const stepsLbl={0:'基本情報',1:'基本行動 1/2',2:'基本行動 2/2',3:`職務遂行（${shLabel(profile.shokushu)}）`,4:'自己成長・学習',5:'目標管理',6:'振り返りコメント',7:'確認'};
  const subLbl={0:'評価期間を確認',1:'誠実・傾聴・協調 各10/5/1点',2:'責任感・接遇マナー 各10/5/1点',3:'職種別 30点満点',4:'全職種共通 30点満点',5:'40点満点',6:'任意記入',7:'内容を確認して提出'};

  let body;
  if(step===0){
    body=h('div',null,
      isSup&&h('div',{style:{background:'var(--blue-l)',borderRadius:'7px',padding:'8px 12px',marginBottom:'12px',fontSize:'12px',color:'var(--blue-d)'}},
        `評価対象者：${fd.targetUser?.name||'—'} / ${fd.targetUser?.dept||'—'} / ${shLabel(fd.targetUser?.shokushu||'')}`
      ),
      h('div',{class:'g2',style:{marginBottom:'12px'}},
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'評価対象期間'),
          h('select',{value:profile.period,onChange(e){upd({profile:{...profile,period:e.target.value}});}},
            h('option',{value:''},'— 選択してください —'),
            ...PERIODS.map(p=>h('option',{value:p.v,selected:p.v===profile.period},p.l))
          )
        ),
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'職種'),
          h('select',{value:profile.shokushu,onChange(e){upd({profile:{...profile,shokushu:e.target.value}});}},
            ...SHOKUSHU.map(s=>h('option',{value:s.id,selected:s.id===profile.shokushu},s.icon+' '+s.label))
          )
        )
      ),
      !isSup&&h('div',{style:{background:'var(--teal-l)',borderRadius:'7px',padding:'8px 12px',fontSize:'12px',color:'var(--teal-d)',lineHeight:'1.6'}},
        '人事評価は「査定」ではなく「育成の機会」です。誠実・傾聴・協調を行動の基盤として正直に自己評価してください。'
      ),
      navRow
    );
  } else if(step===1){body=h('div',null,...barsBlock(KIHON.slice(0,3),answers.kihon,(i,v)=>setK(i,v)),navRow);}
  else if(step===2){body=h('div',null,...barsBlock(KIHON.slice(3),answers.kihon.slice(3),(i,v)=>setK(3+i,v)),navRow);}
  else if(step===3){body=h('div',null,...barsBlock(shQ,answers.shokumu,setS),navRow);}
  else if(step===4){body=h('div',null,...barsBlock(SEICHOU,answers.seichou,setG),navRow);}
  else if(step===5){
    const pts=answers.mokuhyo||0;
    const gRef=[{g:'S',r:'37〜40',c:'#7F77DD',bg:'#EEEDFE'},{g:'A',r:'30〜36',c:'#1D9E75',bg:'#E1F5EE'},{g:'B',r:'23〜29',c:'#378ADD',bg:'#E6F1FB'},{g:'C',r:'16〜22',c:'#BA7517',bg:'#FAEEDA'},{g:'D',r:'0〜15',c:'#E24B4A',bg:'#FCEBEB'}];
    const g2=gRef.find(x=>pts>=(x.r.split('〜')[0]==='0'?0:parseInt(x.r)))||gRef[4];
    // Correct grade calc
    const gg=pts>=37?gRef[0]:pts>=30?gRef[1]:pts>=23?gRef[2]:pts>=16?gRef[3]:gRef[4];
    body=h('div',null,
      h('p',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'12px',lineHeight:'1.6'}},'評価期間中の目標達成度を0〜40点で直接入力してください。'),
      h('div',{style:{background:'var(--bg2)',borderRadius:'7px',padding:'9px 12px',marginBottom:'14px'}},
        h('div',{style:{fontSize:'11px',fontWeight:'500',color:'var(--text2)',marginBottom:'7px'}},'点数の目安'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'5px',textAlign:'center'}},
          ...gRef.map(x=>h('div',{style:{background:x.bg,borderRadius:'6px',padding:'6px 3px'}},
            h('div',{style:{fontSize:'14px',fontWeight:'700',color:x.c}},x.g),
            h('div',{style:{fontSize:'9px',color:x.c,marginTop:'1px'}},x.r+'点')
          ))
        )
      ),
      h('div',{style:{marginBottom:'14px'}},
        h('label',{style:{fontSize:'13px',fontWeight:'500',display:'block',marginBottom:'10px'}},'目標達成点数（0〜40点）'),
        h('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}},
          h('input',{type:'range',min:'0',max:'40',step:'1',value:pts,id:'m-slider',style:{flex:'1',accentColor:'#7F77DD'},
            onInput(e){
              const v=parseInt(e.target.value)||0;
              const ni=document.getElementById('m-num');if(ni)ni.value=v;
              const gd=document.getElementById('m-grade');
              if(gd){const gg=v>=37?'S':v>=30?'A':v>=23?'B':v>=16?'C':'D';gd.textContent=gg+'  '+v+'点 / 40点';}
              if(S.form&&S.form.answers)S.form.answers.mokuhyo=v;
            }
          }),
          h('input',{type:'number',min:'0',max:'40',step:'1',value:pts,id:'m-num',style:{width:'74px',fontSize:'20px',fontWeight:'700',textAlign:'center',padding:'6px 4px',color:'#7F77DD',border:'1.5px solid #7F77DD',borderRadius:'7px'},
            onInput(e){
              let v=parseInt(e.target.value);
              if(isNaN(v)||v<0)v=0;if(v>40)v=40;
              e.target.value=v;
              const sl=document.getElementById('m-slider');if(sl)sl.value=v;
              const gd=document.getElementById('m-grade');
              if(gd){const gg=v>=37?'S':v>=30?'A':v>=23?'B':v>=16?'C':'D';gd.textContent=gg+'  '+v+'点 / 40点';}
              if(S.form&&S.form.answers)S.form.answers.mokuhyo=v;
            }
          }),
          h('span',{style:{fontSize:'13px',color:'var(--text3)'}},'/ 40点')
        )
      ),
      h('div',{id:'m-grade-wrap',style:{background:gg.bg,border:`1.5px solid ${gg.c}`,borderRadius:'8px',padding:'10px 14px',display:'flex',alignItems:'center',gap:'16px'}},
        h('div',{style:{textAlign:'center',minWidth:'50px'}},
          h('div',{id:'m-grade',style:{fontSize:'28px',fontWeight:'700',color:gg.c}},gg.g+'  '+pts+'点 / 40点'),
          h('div',{style:{fontSize:'10px',color:gg.c}},'評価グレード')
        )
      ),
      navRow
    );
  } else if(step===6){
    body=h('div',null,
      h('div',{style:{marginBottom:'11px'}},
        h('label',{style:{fontSize:'12px',fontWeight:'500',display:'block',marginBottom:'5px'}},'成長を感じたこと・取り組みの成果'),
        h('textarea',{onInput(e){S.form&&S.form.answers&&(S.form.answers.growth_text=e.target.value);}},answers.growth_text)
      ),
      h('div',null,
        h('label',{style:{fontSize:'12px',fontWeight:'500',display:'block',marginBottom:'5px'}},'今後、特に取り組みたいこと'),
        h('textarea',{onInput(e){S.form&&S.form.answers&&(S.form.answers.next_text=e.target.value);}},answers.next_text)
      ),navRow
    );
  } else {
    body=h('div',null,
      h('div',{style:{background:g.bg,border:`1.5px solid ${g.color}`,borderRadius:'8px',padding:'11px 14px',marginBottom:'11px',display:'flex',alignItems:'center',gap:'14px'}},
        h('div',{style:{textAlign:'center',minWidth:'60px'}},
          h('div',{class:'grade-big',style:{color:g.color,fontSize:'34px'}},g.g),
          h('div',{style:{fontSize:'10px',color:g.color}},g.label)
        ),
        h('div',{style:{flex:'1'}},
          h('div',{class:'g4',style:{marginBottom:'5px'}},
            ...[{l:'基本行動',v:sc.kihon,m:50},{l:'職務遂行',v:sc.shokumu,m:30},{l:'自己成長',v:sc.seichou,m:30},{l:'目標管理',v:sc.mokuhyo,m:40}].map(x=>
              h('div',{style:{textAlign:'center',background:'rgba(255,255,255,.65)',borderRadius:'5px',padding:'4px 2px'}},
                h('div',{style:{fontSize:'9px',color:g.color}},x.l),
                h('div',{style:{fontSize:'13px',fontWeight:'500',color:g.color}},`${x.v}/${x.m}`)
              )
            )
          ),
          h('div',{style:{fontSize:'14px',fontWeight:'600',color:g.color}},`合計 ${sc.total} / 150点`)
        )
      ),
      low.length>0&&h('div',{style:{background:'var(--amber-l)',border:'0.5px solid var(--amber)',borderRadius:'7px',padding:'7px 10px',marginBottom:'10px',fontSize:'11px',color:'var(--amber-d)'}},
        h('b',null,'📚 優先受講テーマ：'),low.join(' ／ ')
      ),
      ...KIHON.map((k,i)=>h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'11px',padding:'4px 0',borderBottom:'0.5px solid var(--border)'}},
        h('span',{style:{color:'var(--text2)'}},k.label),
        h('span',{style:{fontWeight:'500',color:_la.kihon[i]===10?'#1D9E75':_la.kihon[i]===5?'#378ADD':_la.kihon[i]===1?'#BA7517':'var(--text3)'}},
          _la.kihon[i]?`${_la.kihon[i]}点`:'未入力')
      )),
      navRow
    );
  }

  return h('div',{class:'card'},
    prog,
    h('div',{style:{marginBottom:'12px'}},
      h('h3',{style:{marginBottom:'2px'}},stepsLbl[step]||''),
      h('div',{class:'muted'},subLbl[step]||'')
    ),
    body
  );
}

function renderSelfReadonly(ev){
  if(!ev)return h('div',{style:{textAlign:'center',padding:'24px',color:'var(--text3)',fontSize:'13px'}},'自己評価が提出されていません');
  const sc=calcSc(ev.answers);const g=getG(sc.total);
  const shQ=SHOKUMU[ev.evaluatee_shokushu]||SHOKUMU.other;
  return h('div',null,
    h('div',{style:{background:g.bg,borderRadius:'8px',padding:'10px 12px',marginBottom:'12px',border:`1.5px solid ${g.color}`}},
      h('div',{style:{fontSize:'11px',color:g.color,fontWeight:'500',marginBottom:'2px'}},'自己評価スコア'),
      h('div',{style:{fontSize:'24px',fontWeight:'700',color:g.color}},`${g.g} — ${sc.total}/150点`),
      h('div',{class:'g4',style:{marginTop:'6px'}},
        ...[{l:'基本',v:sc.kihon,m:50},{l:'職務',v:sc.shokumu,m:30},{l:'成長',v:sc.seichou,m:30},{l:'目標',v:sc.mokuhyo,m:40}].map(x=>
          h('div',{style:{textAlign:'center',background:'rgba(255,255,255,.5)',borderRadius:'5px',padding:'3px'}},
            h('div',{style:{fontSize:'9px',color:g.color}},x.l),
            h('div',{style:{fontSize:'12px',fontWeight:'500',color:g.color}},`${x.v}/${x.m}`)
          )
        )
      )
    ),
    h('h4',{style:{marginBottom:'8px',color:'var(--text2)'}},'基本行動評価'),
    ...KIHON.map((k,i)=>{
      const v=ev.answers.kihon[i]||0;
      const vc=v===10?'var(--teal-d)':v===5?'var(--blue-d)':v===1?'var(--amber-d)':'var(--text3)';
      return h('div',{class:'self-ans-item'},
        h('span',{style:{color:'var(--text2)',fontSize:'11px',lineHeight:'1.4',flex:'1'}},k.label),

      );
    }),
    h('h4',{style:{margin:'10px 0 8px',color:'var(--text2)'}},'職務遂行能力'),
    ...shQ.map((k,i)=>{
      const v=ev.answers.shokumu[i]||0;
      const vc=v===10?'var(--teal-d)':v===5?'var(--blue-d)':v===1?'var(--amber-d)':'var(--text3)';
      return h('div',{class:'self-ans-item'},
        h('span',{style:{color:'var(--text2)',fontSize:'11px',flex:'1'}},k.label),

      );
    }),
    h('h4',{style:{margin:'10px 0 8px',color:'var(--text2)'}},'自己成長・学習'),
    ...SEICHOU.map((k,i)=>{
      const v=ev.answers.seichou[i]||0;
      const vc=v===10?'var(--teal-d)':v===5?'var(--blue-d)':v===1?'var(--amber-d)':'var(--text3)';
      return h('div',{class:'self-ans-item'},
        h('span',{style:{color:'var(--text2)',fontSize:'11px',flex:'1'}},k.label),
        h('span',{class:'self-ans-v',style:{color:vc}},v?`${v}点`:'—')

}

function renderSupEval(){
  if(!S.form){
    // Show selection screen
    const u=S.user;
    // 所属長 → 自部署のstaff、事務長 → 所属長のいない部署のstaff全員
    const candidates=u.role==='head'
      ? DB.users.filter(x=>x.dept===u.dept&&x.role==='staff')
      : u.role==='jimucho'||u.role==='sysadmin'
        ? DB.users.filter(x=>x.role==='staff'&&deptNeedsJimucho(x.dept))
        : DB.users.filter(x=>x.id!==u.id&&['staff','head'].includes(x.role));

    return h('div',{},
      h('div',{class:'card'},
        h('div',{style:{marginBottom:'14px'}},
          h('h3',{style:{marginBottom:'3px'}},'上司評価（他者評価）'),
          h('div',{class:'muted'},'評価する職員を選択してください')
        ),
        candidates.length===0
          ? h('div',{style:{textAlign:'center',padding:'24px',color:'var(--text3)'}},'評価対象の職員が登録されていません')
          : h('div',{style:{display:'grid',gap:'8px'}},
              ...candidates.map(t=>{
                const selfEv=DB.evaluations.find(e=>e.evaluatee_id===t.id&&e.type==='self'&&e.status!=='draft');
                const supEv =DB.evaluations.find(e=>e.evaluatee_id===t.id&&e.type==='supervisor');
                return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 13px',border:'0.5px solid var(--border)',borderRadius:'8px',background:'var(--bg)'}},
                  h('div',null,
                    h('span',{style:{fontWeight:'500',fontSize:'13px'}},t.name),rChip(t.role),
                    h('div',{class:'muted',style:{marginTop:'1px'}},t.dept+' / '+shLabel(t.shokushu))
                  ),
                  h('div',{class:'flex gap8'},
                    selfEv?h('span',{class:'badge status-submitted'},'自己評価済み'):h('span',{class:'badge status-draft'},'自己評価なし'),
                    supEv?h('span',{class:'badge status-approved_1'},'上司評価済み')
                      :btn('btn-primary btn-sm','評価を開始',()=>{
                        set({page:'sup-eval',splitSelf:selfEv||null,
                          form:{step:0,answers:initAns(),profile:{period:DB.settings.period||PERIODS[0].v,shokushu:t.shokushu},targetUser:t},
                          evalEditId:null});
                      })
                  )
                );
              })
            )
      )
    );
  }

  // Split pane eval
  const selfEv=S.splitSelf;
  const targetUser=S.form.targetUser;
  const formEl=renderEvalForm(true);

  return h('div',{id:'content',style:{maxWidth:'100%',padding:'0',height:'100%',display:'flex',flexDirection:'column'}},
    h('div',{style:{padding:'10px 16px',background:'var(--bg)',borderBottom:'0.5px solid var(--border)',display:'flex',alignItems:'center',gap:'12px',flexShrink:'0'}},
      btn('btn-secondary btn-sm','← 選択に戻る',()=>set({form:null,splitSelf:null,page:'sup-eval'})),
      h('span',{style:{fontWeight:'500',fontSize:'13px'}},`上司評価：${targetUser?.name||''} / ${targetUser?.dept||''}`),
      selfEv&&h('span',{class:'badge status-submitted',style:{marginLeft:'4px'}},'自己評価を参照中')
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'38% 62%',flex:'1',overflow:'hidden',minHeight:'0'}},
      h('div',{style:{overflow:'y-auto',padding:'14px',background:'var(--bg2)',borderRight:'0.5px solid var(--border)',overflowY:'auto'}},
        h('h4',{style:{marginBottom:'10px',color:'var(--text3)',fontSize:'12px',textTransform:'uppercase',letterSpacing:'.5px'}},'← 対象者の自己評価'),
        renderSelfReadonly(selfEv)
      ),
      h('div',{style:{overflowY:'auto',padding:'14px'}},
        h('h4',{style:{marginBottom:'10px',color:'var(--text3)',fontSize:'12px',textTransform:'uppercase',letterSpacing:'.5px'}},'→ 上司評価を入力'),
        formEl
      )
    )
  );
}

function renderGoals(){
  const u=S.user;
  const goals=DB.goals.filter(g=>g.user_id===u.id);
  const active=goals.filter(g=>g.status!=='completed');
  const done=goals.filter(g=>g.status==='completed');

  function goalCard(gl){
    return h('div',{class:'card mb8',style:{opacity:gl.status==='completed'?'0.72':'1'}},
      h('div',{class:'fb mb8'},
        h('div',null,
          h('div',{style:{fontWeight:'500',fontSize:'13px',marginBottom:'2px'}},gl.title),
          h('div',{class:'flex gap6'},
            h('span',{class:'badge',style:{background:'var(--teal-l)',color:'var(--teal-d)',fontSize:'11px'}},gl.category),
            h('span',{class:'muted'},`期限: ${gl.deadline}`)
          )
        ),
        h('div',{class:'flex gap6'},
          gl.status==='completed'&&h('span',{class:'badge',style:{background:'var(--teal-l)',color:'var(--teal-d)'}},'✓ 完了'),
          btn('btn-secondary btn-xs no-print','編集',()=>set({modal:{type:'edit-goal',goal:Object.assign({},gl)}})),
          btn('btn-danger btn-xs no-print','✕',()=>{
            if(confirm('削除しますか？')){
              DB.goals=DB.goals.filter(g=>g.id!==gl.id);save();schedRender();
            }
          })
        )
      ),
      gl.memo&&h('div',{style:{fontSize:'12px',color:'var(--text2)',background:'var(--bg2)',borderRadius:'6px',padding:'6px 9px',marginBottom:'8px',lineHeight:'1.5'}},gl.memo),
      h('div',{class:'flex gap8'},
        h('input',{type:'range',min:'0',max:'100',step:'1',value:gl.progress,style:{flex:'1',accentColor:'var(--teal)'},
          onInput(e){
            const v=parseInt(e.target.value);
            const i=DB.goals.findIndex(g=>g.id===gl.id);
            if(i>=0){DB.goals[i].progress=v;DB.goals[i].status=v===100?'completed':'active';}
            const lbl=e.target.nextElementSibling;if(lbl)lbl.textContent=v+'%';
            debounceSave();
          }
        }),
        h('span',{class:'prog-lbl',style:{fontSize:'12px',fontWeight:'500',minWidth:'38px',textAlign:'right',color:gl.progress===100?'var(--teal)':'var(--text2)'}},`${gl.progress}%`)
      )
    );
  }

  return h('div',null,
    // ヘッダー
    h('div',{class:'fb mb16'},
      h('div',null,
        h('h3',{style:{marginBottom:'3px'}},'目標管理'),
        h('div',{class:'muted'},'行動目標を設定して進捗を管理します（4月設定・8月中間確認）')
      ),
      btn('btn-primary','+ 目標を追加',()=>set({modal:{type:'add-goal',userId:u.id}}))
    ),
    // 進行中
    active.length>0&&h('div',null,
      h('div',{style:{fontSize:'12px',fontWeight:'500',color:'var(--text3)',marginBottom:'8px'}},
        `進行中 ${active.length}件`),
      ...active.map(goalCard)
    ),
    // 完了済み
    done.length>0&&h('div',{style:{marginTop:'16px'}},
      h('div',{style:{fontSize:'12px',fontWeight:'500',color:'var(--text3)',marginBottom:'8px'}},
        `完了済み ${done.length}件`),
      ...done.map(goalCard)
    ),
    // 空の場合
    goals.length===0&&h('div',{class:'card',style:{textAlign:'center',padding:'32px',borderStyle:'dashed',borderColor:'var(--teal)'}},
      h('div',{style:{color:'var(--text3)',marginBottom:'12px'}},'目標が登録されていません'),
      h('div',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'16px'}},'今年度の行動目標を3項目以内で設定してください'),
      btn('btn-primary','+ 目標を追加',()=>set({modal:{type:'add-goal',userId:u.id}}))
    )
  );
}

// ADMIN: APPROVALS
// ═══════════════════════════════════════════════════
function renderAdminApprovals(){
  const u=S.user;
  const isDept=u.role==='head';
  let pending1=DB.evaluations.filter(e=>e.status==='submitted');
  if(isDept)pending1=pending1.filter(e=>e.evaluatee_dept===u.dept);
  const pending2=CAN_APPROVE2.includes(u.role)?DB.evaluations.filter(e=>e.status==='approved_1'):[];
  const done=DB.evaluations.filter(e=>['approved_2','rejected'].includes(e.status)).sort((a,b)=>b.submitted_at-a.submitted_at).slice(0,20);

  function apvCard(ev,stage){
    const sc2=calcSc(ev.answers);const g2=getG(sc2.total);
    const low2=KIHON.filter((k,i)=>(ev.answers.kihon[i]||0)===1).map(k=>k.training);
    return h('div',{style:{border:`1.5px solid ${g2.color}`,borderRadius:'9px',padding:'11px 13px',marginBottom:'9px',background:g2.bg},class:'card'},
      h('div',{class:'fb mb8'},
        h('div',null,
          h('div',{style:{fontWeight:'500',fontSize:'14px'}},ev.evaluatee_name,h('span',{class:'muted',style:{marginLeft:'6px',fontSize:'11px'}},ev.evaluatee_dept)),
          h('div',{class:'muted',style:{marginTop:'1px'}},shLabel(ev.evaluatee_shokushu)+' · '+ev.period+' · '+(ev.type==='self'?'自己評価':'上司評価'))
        ),
        h('div',{style:{textAlign:'center'}},
          h('div',{class:'grade-big',style:{color:g2.color,fontSize:'28px'}},g2.g),
          h('div',{style:{fontSize:'11px',color:g2.color}},`${sc2.total}点`)
        )
      ),
      low2.length>0&&h('div',{style:{fontSize:'11px',color:'var(--amber-d)',background:'var(--amber-l)',padding:'5px 8px',borderRadius:'5px',marginBottom:'7px'}},
        '📚 '+low2.join(' ／ ')
      ),
      stage===2&&ev.approval_1&&h('div',{style:{fontSize:'11px',color:'var(--teal-d)',background:'var(--teal-l)',padding:'5px 8px',borderRadius:'5px',marginBottom:'7px'}},
        `✔ 一次承認：${ev.approval_1.by_name}（${fmtDate(ev.approval_1.at)}）`,
        ev.approval_1.comment&&h('span',null,' — '+ev.approval_1.comment)
      ),
      h('div',{class:'flex gap8'},
        btn('btn-secondary btn-sm','🖨 印刷',()=>printEval(ev.id)),
        btn('btn-primary btn-sm',stage===1?'✔ 一次承認':'✔ 最終承認',()=>set({modal:{type:'approve',ev,stage}})),
        btn('btn-danger btn-sm','✕ 差戻し',()=>{
          if(confirm('差し戻しますか？')){
            const i=DB.evaluations.findIndex(e=>e.id===ev.id);
            if(i>=0){DB.evaluations[i].status='rejected';}
            save();schedRender();toast('差し戻しました','warn');
          }
        })
      )
    );
  }

  return h('div',{},
    pending1.length>0&&h('div',{class:'mb16'},
      h('h3',{style:{marginBottom:'10px'}},`一次承認待ち（${pending1.length}件）`),
      ...pending1.map(ev=>apvCard(ev,1))
    ),
    pending2.length>0&&h('div',{class:'mb16'},
      h('h3',{style:{marginBottom:'10px'}},`二次承認待ち（${pending2.length}件）`),
      ...pending2.map(ev=>apvCard(ev,2))
    ),
    pending1.length===0&&pending2.length===0&&h('div',{class:'card mb16',style:{textAlign:'center',padding:'24px',color:'var(--text3)',background:'var(--teal-l)',borderColor:'var(--teal)'}},'✓ 承認待ちの評価はありません'),
    done.length>0&&h('div',{class:'card'},
      h('h3',{style:{marginBottom:'10px'}},'承認・差戻し済み'),
      h('div',{style:{overflowX:'auto'}},
        h('table',{class:'tbl'},
          h('thead',null,h('tr',null,...['氏名','期間','合計','グレード','ステータス','最終承認日','操作'].map(l=>h('th',null,l)))),
          h('tbody',null,...done.map(ev=>{
            const sc2=calcSc(ev.answers);const g2=getG(sc2.total);
            return h('tr',null,
              h('td',{style:{fontWeight:'500'}},ev.evaluatee_name),
              h('td',null,ev.period),
              h('td',{style:{color:g2.color,fontWeight:'500'}},`${sc2.total}点`),
              h('td',null,gBadge(g2.g)),
              h('td',null,stBadge(ev.status)),
              h('td',null,fmtDate(ev.approval_2?.at||ev.submitted_at)),
              h('td',null,btn('btn-secondary btn-xs no-print','🖨',()=>printEval(ev.id)))
            );
          }))
        )
      )
    )
  );
}

// ADMIN: DASHBOARD
// ═══════════════════════════════════════════════════
function renderAdminDashboard(){
  const u=S.user;
  const isDeptOnly=u.role==='head';
  let evs=DB.evaluations.filter(e=>e.status==='submitted'||e.status==='approved_1'||e.status==='approved_2');
  if(isDeptOnly)evs=evs.filter(e=>e.evaluatee_dept===u.dept);

  const avg=evs.length?Math.round(evs.reduce((a,e)=>a+calcSc(e.answers).total,0)/evs.length):0;
  const gDist={S:0,A:0,B:0,C:0,D:0};
  evs.forEach(e=>{gDist[getG(calcSc(e.answers).total).g]++;});

  // Dept breakdown (for jimucho/incho/sysadmin)
  // 固定部署リストをベースに集計（DBにある部署のみ表示）
  const usedDepts=[...new Set(DB.users.map(u=>u.dept))].filter(Boolean);
  const depts=DEPTS.filter(d=>usedDepts.includes(d)).concat(usedDepts.filter(d=>!DEPTS.includes(d)));
  const deptData=depts.map(d=>{
    const devs=evs.filter(e=>e.evaluatee_dept===d);
    return{dept:d,count:devs.length,avg:devs.length?Math.round(devs.reduce((a,e)=>a+calcSc(e.answers).total,0)/devs.length):0};
  }).filter(d=>d.count>0);

  return h('div',{},
    h('div',{class:'g4 mb16'},
      ...[{l:'対象件数',v:`${evs.length}件`,c:'var(--teal)'},{l:'平均スコア',v:`${avg}点`,c:'var(--blue)'},{l:'S/A評価',v:`${(gDist.S||0)+(gDist.A||0)}名`,c:'var(--purple)'},{l:'C/D評価',v:`${(gDist.C||0)+(gDist.D||0)}名`,c:'var(--red)'}]
      .map(x=>h('div',{class:'card',style:{textAlign:'center'}},
        h('div',{class:'muted mb8'},x.l),
        h('div',{style:{fontSize:'22px',fontWeight:'500',color:x.c}},x.v)
      ))
    ),
    h('div',{class:'g2 mb16'},
      h('div',{class:'card'},
        h('h3',{style:{marginBottom:'12px'}},'グレード分布'),
        h('div',{class:'bchart'},
          ...GRADE_DEF.map(gd=>h('div',{class:'brow'},
            h('div',{class:'brow-lbl'},gd.g),
            h('div',{class:'btrack'},
              evs.length>0&&h('div',{class:'bfill',style:{width:Math.round((gDist[gd.g]||0)/evs.length*100)+'%',background:gd.color,minWidth:(gDist[gd.g]||0)>0?'20px':'0'}},
                (gDist[gd.g]||0)>0?`${gDist[gd.g]}名`:''
              )
            ),
            h('span',{style:{fontSize:'11px',color:'var(--text3)',minWidth:'28px'}},gDist[gd.g]||0)
          ))
        )
      ),
      h('div',{class:'card'},
        h('h3',{style:{marginBottom:'12px'}},'セクション別平均'),
        h('div',{class:'bchart'},
          ...(evs.length?[{l:'基本行動',v:Math.round(evs.reduce((a,e)=>a+calcSc(e.answers).kihon,0)/evs.length),m:50,c:'#1D9E75'},{l:'職務遂行',v:Math.round(evs.reduce((a,e)=>a+calcSc(e.answers).shokumu,0)/evs.length),m:30,c:'#378ADD'},{l:'自己成長',v:Math.round(evs.reduce((a,e)=>a+calcSc(e.answers).seichou,0)/evs.length),m:30,c:'#BA7517'},{l:'目標管理',v:Math.round(evs.reduce((a,e)=>a+calcSc(e.answers).mokuhyo,0)/evs.length),m:40,c:'#7F77DD'}]:[])
          .map(x=>h('div',{class:'brow'},
            h('div',{class:'brow-lbl'},x.l),
            h('div',{class:'btrack'},h('div',{class:'bfill',style:{width:Math.round(x.v/x.m*100)+'%',background:x.c}},`${x.v}pt`)),
            h('span',{style:{fontSize:'11px',color:'var(--text3)',minWidth:'38px'}},`${x.v}/${x.m}`)
          ))
        )
      )
    ),
    !isDeptOnly&&deptData.length>0&&h('div',{class:'card mb16'},
      h('h3',{style:{marginBottom:'12px'}},'部署別平均スコア'),
      h('div',{class:'bchart'},
        ...deptData.sort((a,b)=>b.avg-a.avg).map(d=>h('div',{class:'brow'},
          h('div',{class:'brow-lbl',style:{minWidth:'90px',fontSize:'11px'}},d.dept),
          h('div',{class:'btrack'},h('div',{class:'bfill',style:{width:Math.round(d.avg/150*100)+'%',background:'var(--teal)'}},`${d.avg}点`)),
          h('span',{style:{fontSize:'11px',color:'var(--text3)',minWidth:'54px'}},`${d.avg}点 / ${d.count}件`)
        ))
      )
    ),
    h('div',{class:'card'},
      h('div',{class:'fb mb12'},
        h('h3',null,'提出一覧'),
        btn('btn-secondary btn-sm no-print','CSVエクスポート',()=>exportCSV(evs))
      ),
      evs.length===0?h('div',{style:{textAlign:'center',padding:'24px',color:'var(--text3)'}},'データがありません')
      :h('div',{style:{overflowX:'auto'}},
        h('table',{class:'tbl'},
          h('thead',null,h('tr',null,...['氏名','所属','合計','グレード','種別','ステータス','提出日'].map(l=>h('th',null,l)))),
          h('tbody',null,...evs.sort((a,b)=>b.submitted_at-a.submitted_at).map(ev=>{
            const sc2=calcSc(ev.answers);const g2=getG(sc2.total);
            return h('tr',null,
              h('td',{style:{fontWeight:'500'}},ev.evaluatee_name),
              h('td',null,ev.evaluatee_dept),
              h('td',{style:{color:g2.color,fontWeight:'500'}},`${sc2.total}点`),
              h('td',null,gBadge(g2.g)),
              h('td',null,ev.type==='self'?'自己':'上司'),
              h('td',null,stBadge(ev.status)),
              h('td',null,fmtDate(ev.submitted_at))
            );
          }))
        )
      )
    )
  );
}

      )
    ),
    h('div',{class:'flex gap8'},
      btn('btn-primary','パスワードを変更する',()=>{
        const dbUser=DB.users.find(x=>x.id===u.id);
        if(!dbUser){errEl.textContent='ユーザーが見つかりません';errEl.style.display='block';return;}
        if(cur!==dbUser.password){errEl.textContent='現在のパスワードが正しくありません';errEl.style.display='block';return;}
        if(!nw.trim()){errEl.textContent='新しいパスワードを入力してください';errEl.style.display='block';return;}
        if(nw!==cf){errEl.textContent='新しいパスワードが一致しません';errEl.style.display='block';return;}
        const i=DB.users.findIndex(x=>x.id===u.id);
        if(i>=0)DB.users[i].password=nw;
        save();
        toast('パスワードを変更しました');
        set({page:'dashboard'});
      })
    )
  );
  return h('div',null,form);
}

// ═══════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════
function renderModal(){
  const m=S.modal;if(!m)return null;
  let body;

  if(m.type==='approve'){
    const{ev,stage}=m;let comment='';
    const sc2=calcSc(ev.answers);const g2=getG(sc2.total);
    const label=stage===1?'一次承認（所属長）':'二次承認（事務長）';
    body=h('div',null,
      h('h3',{style:{marginBottom:'10px'}},`${ev.evaluatee_name} さんの評価を${label}`),
      h('div',{style:{background:g2.bg,borderRadius:'7px',padding:'8px 12px',marginBottom:'12px',fontSize:'13px',color:g2.color,fontWeight:'500'}},
        `${g2.g} ${g2.label} — ${sc2.total}/150点`
      ),
      h('div',{style:{marginBottom:'12px'}},
        h('label',{style:{fontSize:'12px',fontWeight:'500',display:'block',marginBottom:'5px'}},label+'コメント（任意）'),
        h('textarea',{placeholder:'フィードバックコメント…',onInput(e){comment=e.target.value;}})
      ),
      h('div',{class:'flex gap8',style:{justifyContent:'flex-end'}},
        btn('btn-secondary','キャンセル',()=>set({modal:null})),
        btn('btn-primary',`✔ ${label}する`,()=>{
          const i=DB.evaluations.findIndex(e=>e.id===ev.id);
          if(i>=0){
            if(stage===1){DB.evaluations[i].status='approved_1';DB.evaluations[i].approval_1={at:Date.now(),by_id:S.user.id,by_name:S.user.name,comment};}
            else{DB.evaluations[i].status='approved_2';DB.evaluations[i].approval_2={at:Date.now(),by_id:S.user.id,by_name:S.user.name,comment};}
          }
          save();set({modal:null});toast('承認しました');
        })
      )
    );
  }

  if(m.type==='add-goal'||m.type==='edit-goal'){
    const isEditGoal=m.type==='edit-goal';
    let gf=isEditGoal
      ? {title:m.goal.title,category:m.goal.category,deadline:m.goal.deadline,progress:m.goal.progress||0,memo:m.goal.memo||''}
      : {title:'',category:'誠実',deadline:'',progress:0,memo:''};
    body=h('div',null,
      h('h3',{style:{marginBottom:'12px'}},isEditGoal?'目標を編集':'目標を追加'),
      h('div',{style:{display:'grid',gap:'9px',marginBottom:'12px'}},
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'目標タイトル'),
          h('input',{type:'text',value:gf.title,placeholder:'例: 患者説明スキルの向上',onInput(e){gf.title=e.target.value;}})
        ),
        h('div',{class:'g2'},
          h('div',null,
            h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'カテゴリ'),
            h('select',{value:gf.category,onChange(e){gf.category=e.target.value;}},
              ...['誠実','傾聴','協調','職務遂行','自己成長'].map(c=>h('option',{value:c,selected:c===gf.category},c))
            )
          ),
          h('div',null,
            h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'期限'),
            h('input',{type:'date',value:gf.deadline,onInput(e){gf.deadline=e.target.value;}})
          )
        ),
        isEditGoal&&h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'進捗（'+gf.progress+'%）'),
          h('input',{type:'range',min:'0',max:'100',step:'1',value:gf.progress,style:{width:'100%',accentColor:'var(--teal)'},
            onInput(e){gf.progress=parseInt(e.target.value);const l=e.target.previousElementSibling;if(l)l.textContent='進捗（'+e.target.value+'%）';}
          })
        ),
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'メモ（任意）'),
          h('textarea',{value:gf.memo,placeholder:'目標の詳細や取り組み方針など',style:{minHeight:'60px'},onInput(e){gf.memo=e.target.value;}},gf.memo)
        )
      ),
      h('div',{class:'flex gap8',style:{justifyContent:'flex-end'}},
        btn('btn-secondary','キャンセル',()=>set({modal:null})),
        btn('btn-primary',isEditGoal?'保存する':'追加する',()=>{
          if(!gf.title||!gf.deadline){alert('タイトルと期限を入力してください');return;}
          if(isEditGoal){
            const i=DB.goals.findIndex(g=>g.id===m.goal.id);
            if(i>=0){DB.goals[i]={...DB.goals[i],...gf,status:gf.progress===100?'completed':'active'};}
          } else {
            DB.goals.push({id:uid(),user_id:m.userId,...gf,status:'active',created_at:Date.now()});
          }
          save();set({modal:null});toast(isEditGoal?'目標を更新しました':'目標を追加しました');
        })
      )
    );
  }

  if(m.type==='add-user'||m.type==='edit-user'){
    const isEdit=m.type==='edit-user';
    const uf=isEdit?m.user:{id:uid(),name:'',dept:'',shokushu:'kango',role:'staff',password:'',birthdate:'',created_at:Date.now()};
    function upField(k,v){uf[k]=v;}
    const depts=[...new Set(DB.users.map(u=>u.dept))].filter(Boolean);
    body=h('div',null,
      h('h3',{style:{marginBottom:'12px'}},isEdit?'ユーザー編集':'ユーザー追加'),
      h('div',{style:{display:'grid',gap:'9px',marginBottom:'12px'}},
        h('div',null,h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'氏名'),
          h('input',{type:'text',value:uf.name,placeholder:'山田 花子',onInput(e){upField('name',e.target.value);}})
        ),
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'所属部署'),
          h('select',{value:uf.dept,onChange(e){upField('dept',e.target.value);}},
            h('option',{value:''},'— 選択してください —'),
            ...DEPTS.map(d=>h('option',{value:d,selected:d===uf.dept},d))
          )
        ),
        h('div',{class:'g2'},
          h('div',null,h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'職種'),
            h('select',{value:uf.shokushu,onChange(e){upField('shokushu',e.target.value);}},
              ...SHOKUSHU.map(s=>h('option',{value:s.id,selected:s.id===uf.shokushu},s.icon+' '+s.label))
            )
          ),
          h('div',null,h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'役割'),
            h('select',{value:uf.role,onChange(e){upField('role',e.target.value);}},
              ...Object.entries(ROLES).map(([k,v])=>h('option',{value:k,selected:k===uf.role},v.label))
            )
          )
        ),
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'生年月日（初期パスワードになります）'),
          h('input',{type:'date',value:uf.birthdate||'',
            onInput(e){
              upField('birthdate',e.target.value);
              if(!isEdit&&e.target.value){
                upField('password',e.target.value.replace(/-/g,''));
                const pwHint=document.getElementById('pw-hint');
                if(pwHint)pwHint.textContent='自動設定: '+e.target.value.replace(/-/g,'');
              }
            }
          })
        ),
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},isEdit?'パスワード（変更する場合のみ入力）':'パスワード（空欄なら生年月日8桁が自動設定）'),
          pwField('', isEdit?'変更する場合のみ入力':'生年月日から自動設定されます',
            function(e){if(e.target.value)upField('password',e.target.value);}
          ),
          !isEdit&&h('div',{id:'pw-hint',style:{fontSize:'11px',color:'var(--teal-d)',marginTop:'3px'}},
            uf.birthdate?'自動設定: '+uf.birthdate.replace(/-/g,''):'生年月日を入力すると自動設定されます'
          )
        )
      ),
      h('div',{class:'flex gap8',style:{justifyContent:'flex-end'}},
        btn('btn-secondary','キャンセル',()=>set({modal:null})),
        btn('btn-primary',isEdit?'保存':'追加',()=>{
          if(!uf.name.trim()||!uf.dept.trim()){alert('氏名と所属を入力してください');return;}
          if(!isEdit){
            if(!uf.password.trim()&&!uf.birthdate){alert('生年月日またはパスワードを設定してください');return;}
            if(!uf.password.trim()&&uf.birthdate)upField('password',uf.birthdate.replace(/-/g,''));
            if(DB.users.find(u=>u.name===uf.name.trim()&&u.dept===uf.dept.trim())){alert('同じ氏名・所属のユーザーが既に存在します');return;}
          }
          if(isEdit){const i=DB.users.findIndex(u=>u.id===uf.id);if(i>=0)DB.users[i]=uf;}
          else DB.users.push(uf);
          save();set({modal:null});toast(isEdit?'ユーザーを更新しました':'ユーザーを追加しました');
        })
      )
    );
  }

  if(m.type==='cloud-config'){
    // input の値はDOM直接参照（再描画で消えないように）
    const urlIn=h('input',{type:'text',id:'cfg-url',
      value:CLOUD.url,
      placeholder:'https://script.google.com/macros/s/AKfy.../exec'});
    const secIn=h('input',{type:'text',id:'cfg-sec',
      value:CLOUD.secret,
      placeholder:'例: Ryujinkai@2025Hospital'});
    const testEl=h('div',{id:'cloud-test',style:{fontSize:'12px',marginTop:'8px',padding:'7px 10px',borderRadius:'6px',display:'none'}});

    function runTest(){
      const url=(document.getElementById('cfg-url')||urlIn).value.trim();
      const sec=(document.getElementById('cfg-sec')||secIn).value.trim();
      if(!url||!sec){testEl.textContent='URLと秘密キーを入力してください';testEl.style.background='var(--red-l)';testEl.style.color='var(--red)';testEl.style.display='block';return;}
      testEl.textContent='接続テスト中…';testEl.style.background='var(--blue-l)';testEl.style.color='var(--blue-d)';testEl.style.display='block';
      // 一時的にCLOUDをセット
      const prev=Object.assign({},CLOUD);
      CLOUD={url,secret:sec};
      loadFromCloud().then(data=>{
        if(data&&data.users){
          testEl.textContent='✅ 接続成功！データを取得しました。「保存」を押して確定してください。';
          testEl.style.background='var(--teal-l)';testEl.style.color='var(--teal-d)';
          // 成功データを一時保持
          testEl.dataset.ok='1';
          testEl.dataset.url=url;
          testEl.dataset.sec=sec;
        } else {
          CLOUD=prev; // 失敗したら元に戻す
          testEl.textContent='❌ 接続失敗。URLと秘密キーを確認してください。';
          testEl.style.background='var(--red-l)';testEl.style.color='var(--red)';
          testEl.dataset.ok='';
        }
      }).catch(()=>{
        CLOUD=prev;
        testEl.textContent='❌ 接続エラーが発生しました。';
        testEl.style.background='var(--red-l)';testEl.style.color='var(--red)';
        testEl.dataset.ok='';
      });
    }

    body=h('div',null,
      h('h3',{style:{marginBottom:'12px'}},'☁ クラウド接続設定'),
      IS_FILE_PROTOCOL
        ? h('div',{style:{background:'var(--amber-l)',borderRadius:'7px',padding:'9px 12px',marginBottom:'14px',fontSize:'12px',color:'var(--amber-d)'}},
            '⚠ ローカルファイル（file://）では接続できません。GitHub Pages の URL で開いてください。')
        : h('div',{style:{background:'var(--blue-l)',borderRadius:'7px',padding:'9px 12px',marginBottom:'14px',fontSize:'12px',color:'var(--blue-d)',lineHeight:'1.6'}},
            'Google Apps Script の Web App URL と秘密キーを入力してください。'),
      h('div',{style:{display:'grid',gap:'10px',marginBottom:'14px'}},
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'Apps Script Web App URL'),
          urlIn
        ),
        h('div',null,
          h('label',{class:'muted',style:{display:'block',marginBottom:'3px'}},'秘密キー'),
          secIn
        )
      ),
      testEl,
      h('div',{class:'flex gap8',style:{justifyContent:'space-between',marginTop:'12px',flexWrap:'wrap'}},
        h('div',{class:'flex gap8'},
          btn('btn-secondary','🔌 接続テスト',runTest),
          CLOUD.url&&btn('btn-danger btn-sm','接続を解除',()=>{
            CLOUD={url:'',secret:''};saveCloudCfg();
            set({modal:null});toast('クラウド接続を解除しました','warn');
          })
        ),
        h('div',{class:'flex gap8'},
          btn('btn-secondary','キャンセル',()=>set({modal:null})),
          btn('btn-primary','保存',()=>{
            const url=(document.getElementById('cfg-url')||urlIn).value.trim();
            const sec=(document.getElementById('cfg-sec')||secIn).value.trim();
            if(!url||!sec){alert('URLと秘密キーを入力してください');return;}
            CLOUD={url,secret:sec};saveCloudCfg();
            // 接続テスト成功済みならデータ取得
            const te=document.getElementById('cloud-test');
            if(te&&te.dataset.ok==='1'){
              loadFromCloud().then(data=>{if(data&&data.users){DB=data;saveDB(DB);}});
            }
            set({modal:null});toast('クラウド設定を保存しました');
          })
        )
      )
    );
  }

  return h('div',{class:'overlay',onClick(e){if(e.target===e.currentTarget)set({modal:null});}},
    h('div',{class:'modal'},body)
  );
}

// ═══════════════════════════════════════════════════
// TOPBAR TITLES
// ═══════════════════════════════════════════════════
const PAGE_TITLES={
  'change-pw':'パスワード変更',
  'dashboard':'ダッシュボード',
  'self-eval':'自己評価入力',
  'sup-eval':'上司評価（他者評価）',
  'goals':'目標管理',
  'history':'評価履歴',
  'admin-approvals':'承認管理',
  'admin-dashboard':'集計・分析ダッシュボード',
  'admin-export':'エクスポート・ガイド',
  'admin-users':'ユーザー管理',
};

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function renderPageContent(){
  switch(S.page){
    case 'dashboard':       return renderDashboard();
    case 'self-eval':       return renderEvalForm(false);
    case 'goals':           return renderGoals();
    case 'history':         return renderHistory();
    case 'change-pw':       return renderChangePw();
    case 'admin-approvals': return renderAdminApprovals();
    case 'admin-dashboard': return renderAdminDashboard();
    case 'admin-export':    return renderAdminExport();
    case 'admin-users':     return renderAdminUsers();
    default:                return renderDashboard();
  }
}

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  try {
  app.innerHTML='';
  if(S.screen==='login'){
    app.appendChild(renderLogin());
    if(S.toast)app.appendChild(h('div',{class:'toast',style:{background:S.toast.type==='warn'?'var(--amber)':'var(--teal)'}},S.toast.msg));
    return;
  }
  if(!S.user){S.screen='login';schedRender();return;}

  const isSupWithForm=S.page==='sup-eval'&&S.form;

  const layout=h('div',{id:'layout'},
    renderSidebar(),
    h('div',{id:'main'},
      h('div',{id:'topbar'},
        h('span',null,PAGE_TITLES[S.page]||''),
        h('div',{class:'flex gap8'},
          h('span',{id:'sync-badge',style:{fontSize:'11px',padding:'3px 8px',borderRadius:'5px',background:'var(--bg3)',color:'var(--text3)'}},
            IS_FILE_PROTOCOL ? '📁 ローカル動作' : (CLOUD.url ? '☁ クラウド同期済' : 'ローカル保存')
          ),
          ['sysadmin','jimucho'].includes(S.user?.role)&&
            btn('btn-secondary btn-sm no-print','☁ クラウド設定',()=>set({modal:{type:'cloud-config'}})),
          btn('btn-secondary btn-sm no-print','🖨 ページ印刷',()=>window.print()),
          h('span',{class:'muted'},S.user?.name)
        )
      ),
      isSupWithForm
        ? renderSupEval()
        : h('div',{style:{flex:'1',overflowY:'auto',padding:'14px',maxWidth:'800px'}},
            S.page==='sup-eval'?renderSupEval():renderPageContent()
          )
    )
  );
  app.appendChild(layout);
  const modal=renderModal();if(modal)app.appendChild(modal);
  if(S.toast)app.appendChild(h('div',{class:'toast',style:{background:S.toast.type==='warn'?'var(--amber)':'var(--teal)'}},S.toast.msg));
  } catch(err){
    // エラーを画面に表示（デバッグ用）
    console.error('render error:', err);
    app.innerHTML='';
    const eDiv=document.createElement('div');
    eDiv.style.cssText='position:fixed;top:0;left:0;right:0;background:#FCEBEB;color:#A32D2D;padding:20px;font-family:monospace;font-size:13px;z-index:9999;border-bottom:2px solid #E24B4A;';
    eDiv.innerHTML='<b>表示エラー</b><br>'+err.message+'<br><br><small>'+err.stack+'</small><br><br><button onclick="location.reload()" style="padding:6px 14px;cursor:pointer;margin-right:8px">再読み込み</button><button onclick="localStorage.clear();location.reload()" style="padding:6px 14px;cursor:pointer;background:#E24B4A;color:#fff;border:none">データリセットして再起動</button>';
    app.appendChild(eDiv);
  }
}

// ── 初期化（クラウドから読み込み試行）──────────────
function init(){
  // 起動時は必ずローカルデータで表示（クラウドは後でバックグラウンド同期）
  syncStatus = 'local';
  render();
  // クラウド設定があれば非同期で最新データを取得して再描画
  if(CLOUD.url && CLOUD.secret && !IS_FILE_PROTOCOL){
    loadFromCloud().then(function(cloudData){
      if(cloudData && cloudData.users){
        DB = cloudData;
        saveDB(DB);
        syncStatus = 'synced';
        schedRender();
      }
    }).catch(function(){ syncStatus='error'; });
  }
}

try { init(); } catch(e){ console.error('init error:',e); render(); }
</script>
</body>
